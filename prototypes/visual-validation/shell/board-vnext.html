<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Prototype visuel AGRAFES: AGRAFES — Board V-next."
    />
    <link rel="icon" href="../favicon.ico" />
    <title>AGRAFES — Board V-next</title>
    <style>
      :root {
        --bg: #f0f2f5;
        --surface: #fff;
        --line: #dde1e8;
        --text: #1a1a2e;
        --muted: #4f5d6d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
        line-height: 1.45;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 5;
        background: #1a1a2e;
        color: #fff;
        border-bottom: 1px solid #11111f;
        padding: 12px 16px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      p {
        margin: 4px 0 0;
        font-size: 14px;
        color: #e0e6f4;
      }
      .proto-nav {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .proto-nav a {
        border: 1px solid rgba(255,255,255,.28);
        border-radius: 999px;
        padding: 8px 13px;
        font-size: 14px;
        color: #fff;
        text-decoration: none;
        background: rgba(255,255,255,.12);
      }
      .proto-nav a.active {
        background: rgba(255,255,255,.24);
        font-weight: 700;
      }
      main {
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(560px, 1fr));
        gap: 14px;
      }
      .pane {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        overflow: hidden;
        min-height: 600px;
      }
      .pane-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: #f8f9fa;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .pane-head strong {
        font-size: 15px;
      }
      .pane-head a {
        font-size: 13px;
        color: #2c5f9e;
        text-decoration: none;
      }
      iframe {
        width: 100%;
        height: 760px;
        border: 0;
        background: #fff;
      }
      @media (max-width: 1180px) {
        main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AGRAFES V-next — Validation visuelle complète</h1>
      <p>Vue d’ensemble Home + Explorer + Constituer + Publier avec palette DESIGN unifiée.</p>
      <nav class="proto-nav" aria-label="Navigation maquettes">
        <a href="../index.html">Index</a>
        <a class="active" href="./board-vnext.html">Board</a>
        <a href="./shell-vnext.html">Home</a>
        <a href="./explorer-vnext.html">Explorer</a>
        <a href="../prep/prep-vnext.html">Constituer</a>
        <a href="./publish-vnext.html">Publier</a>
      </nav>
    </header>

    <main>
      <section class="pane">
        <div class="pane-head">
          <strong>Shell / Home</strong>
          <a href="./shell-vnext.html">ouvrir seul</a>
        </div>
        <iframe src="./shell-vnext.html" title="Shell"></iframe>
      </section>

      <section class="pane">
        <div class="pane-head">
          <strong>Explorer</strong>
          <a href="./explorer-vnext.html">ouvrir seul</a>
        </div>
        <iframe src="./explorer-vnext.html" title="Explorer"></iframe>
      </section>

      <section class="pane">
        <div class="pane-head">
          <strong>Constituer</strong>
          <a href="../prep/prep-actions-vnext.html">ouvrir seul</a>
        </div>
        <iframe src="../prep/prep-actions-vnext.html" title="Constituer"></iframe>
      </section>

      <section class="pane">
        <div class="pane-head">
          <strong>Publier</strong>
          <a href="./publish-vnext.html">ouvrir seul</a>
        </div>
        <iframe src="./publish-vnext.html" title="Publier"></iframe>
      </section>
    </main>
  </body>
</html>
