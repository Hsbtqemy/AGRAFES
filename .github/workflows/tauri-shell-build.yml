name: Tauri Shell — Build (unsigned)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: ""

permissions:
  contents: write   # needed for release upload on tags

jobs:
  build-shell:
    name: Build Shell — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            sidecar_format: onefile
            artifact_suffix: macos
          - os: ubuntu-latest
            sidecar_format: onedir
            artifact_suffix: linux
          - os: windows-latest
            sidecar_format: onefile
            artifact_suffix: windows

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      # ── 2. Node 20 ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tauri-app/package-lock.json
            tauri-prep/package-lock.json
            tauri-shell/package-lock.json

      # ── 3. Rust stable ───────────────────────────────────────────────────────
      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "tauri-shell/src-tauri -> target"

      # ── 4. Python 3.11 ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 5. Linux system deps for Tauri ───────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── 6. Install Python packaging deps + build sidecar ─────────────────────
      - name: Install Python packaging dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[packaging]"

      - name: Build sidecar (shell preset)
        run: python scripts/build_sidecar.py --preset shell --format "${{ matrix.sidecar_format }}"

      - name: Enforce sidecar size budget (shell)
        run: |
          python scripts/check_sidecar_size_budget.py \
            --manifest tauri-shell/src-tauri/binaries/sidecar-manifest.json \
            --budget-file bench/fixtures/sidecar_size_budget.json

      - name: Verify sidecar binary starts (non-Windows)
        if: runner.os != 'Windows'
        run: |
          MANIFEST="tauri-shell/src-tauri/binaries/sidecar-manifest.json"
          if [ -f "$MANIFEST" ]; then
            EXE_PATH="$(python3 -c 'import json; print(json.loads(open("'"$MANIFEST"'").read())["executable_path"])')"
            chmod +x "$EXE_PATH"
            "$EXE_PATH" --help > /dev/null && echo "✅ Sidecar OK" || echo "⚠ Sidecar --help failed (continuing)"
          else
            echo "No manifest found, skipping sidecar verify"
          fi

      - name: Verify sidecar binary starts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $manifest = "tauri-shell/src-tauri/binaries/sidecar-manifest.json"
          if (Test-Path $manifest) {
            $exePath = (Get-Content $manifest | ConvertFrom-Json).executable_path
            & "$exePath" --help 2>&1 | Out-Null
            Write-Host "✅ Sidecar OK"
          } else {
            Write-Host "No manifest found, skipping sidecar verify"
          }

      # ── 7. npm install ────────────────────────────────────────────────────────
      - name: Install npm dependencies (shared apps + tauri-shell)
        run: |
          npm --prefix tauri-app ci --prefer-offline
          npm --prefix tauri-prep ci --prefer-offline
          npm --prefix tauri-shell ci --prefer-offline

      # ── 8. Tauri build ────────────────────────────────────────────────────────
      - name: Build Tauri Shell Windows NSIS (unsigned)
        if: runner.os == 'Windows'
        env:
          # Disable code signing — build unsigned
          TAURI_SIGNING_PRIVATE_KEY: ""
          APPLE_SIGNING_IDENTITY: "-"
          CI: "true"
        run: npm --prefix tauri-shell run tauri:build:windows

      - name: Build Tauri Shell non-Windows (unsigned)
        if: runner.os != 'Windows'
        env:
          # Disable code signing — build unsigned
          TAURI_SIGNING_PRIVATE_KEY: ""
          APPLE_SIGNING_IDENTITY: "-"
          CI: "true"
        working-directory: tauri-shell
        run: npm run tauri build -- --bundles app,deb,appimage,nsis,dmg 2>&1 || npm run tauri build

      # ── 9. Collect artifacts ──────────────────────────────────────────────────
      - name: Collect build artifacts (non-Windows)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-shell
          # Release bundles (avoid uploading .app internals as individual assets)
          find tauri-shell/src-tauri/target/release/bundle -name "*.dmg" \
               -o -name "*.AppImage" -o -name "*.deb" 2>/dev/null | \
            xargs -I{} cp -r {} dist-shell/ 2>/dev/null || true
          # Sidecar manifest (suffix per OS to avoid duplicate release asset names)
          cp tauri-shell/src-tauri/binaries/sidecar-manifest.json \
            "dist-shell/sidecar-manifest-${{ matrix.artifact_suffix }}.json" 2>/dev/null || true
          ls -lh dist-shell/ || true

      - name: Collect build artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-shell | Out-Null
          Get-ChildItem -Recurse tauri-shell/src-tauri/target/release/bundle `
            -Include "*.exe","*.msi" -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName dist-shell/ }
          Copy-Item tauri-shell/src-tauri/binaries/sidecar-manifest.json "dist-shell/sidecar-manifest-${{ matrix.artifact_suffix }}.json" -ErrorAction SilentlyContinue
          Get-ChildItem dist-shell/

      # ── 10. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload shell artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-shell-unsigned-${{ matrix.artifact_suffix }}
          path: dist-shell/
          retention-days: 30
          if-no-files-found: warn

  # ── Attach to GitHub Release (on tag push only) ──────────────────────────────
  attach-release:
    name: Attach to GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: build-shell
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all shell artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-shell-unsigned-*
          path: release-shell-artifacts
          merge-multiple: false

      - name: List release artifacts
        run: find release-shell-artifacts -type f | sort

      - name: Prepare release assets (filtered + unique basenames)
        run: |
          mkdir -p release-shell-assets
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          src = Path("release-shell-artifacts")
          dst = Path("release-shell-assets")
          allowed_suffixes = (".exe", ".msi", ".dmg", ".deb", ".AppImage")

          selected = []
          for p in src.rglob("*"):
              if not p.is_file():
                  continue
              name = p.name
              if name.startswith("sidecar-manifest-") and name.endswith(".json"):
                  selected.append(p)
                  continue
              if name.endswith(allowed_suffixes):
                  selected.append(p)

          by_name = {}
          for p in selected:
              by_name[p.name] = by_name.get(p.name, 0) + 1
          duplicates = sorted(name for name, count in by_name.items() if count > 1)
          if duplicates:
              raise SystemExit(
                  "Duplicate release asset basenames detected: " + ", ".join(duplicates)
              )

          for p in selected:
              shutil.copy2(p, dst / p.name)

          print("Prepared release assets:")
          for p in sorted(dst.iterdir()):
              print(f" - {p.name}")
          PY
          ls -lh release-shell-assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-shell-assets/*
          fail_on_unmatched_files: false
          tag_name: ${{ github.ref_name }}
