name: Sidecar growth gate

# Mécanisme : empêche `sidecar.py` de continuer à grossir indéfiniment
# par PRs incrémentales sous le radar.
#
# Mesure : croissance NETTE (insertions - deletions) sur fenêtre glissante
# 90 jours, mesurée via git log --numstat. Seuil : 500 lignes.
#
# Override d'urgence : commit trailer `Sidecar-Growth-Override: <motif>` dans
# le dernier commit (typiquement un CVE ou un fix sécurité critique).
# Tracé en clair dans l'historique git, auditable, sans secret CI.
#
# Exemple de commit autorisé à dépasser :
#
#     fix(security): patch CVE-2026-XXXX dans curate handler
#
#     Sidecar-Growth-Override: CVE-2026-XXXX requires immediate fix,
#     refactor scheduled in v0.2.0
#
# Volontairement en `add - del` (croissance nette) plutôt que `add + del`
# (churn). On veut limiter la croissance, pas pénaliser les vrais refactors
# qui suppriment plus qu'ils n'ajoutent.

on:
  pull_request:
    paths:
      - 'src/multicorpus_engine/sidecar.py'

permissions:
  contents: read
  pull-requests: read

jobs:
  growth-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0  # full history requis pour --since

      - name: Compute net growth on sliding 90-day window
        id: growth
        run: |
          set -eu
          THRESHOLD=500
          DAYS=90
          FILE=src/multicorpus_engine/sidecar.py

          GROWTH=$(git log --numstat --since="$DAYS days ago" -- "$FILE" \
            | awk 'NF==3 {add+=$1; del+=$2} END {print (add-del)+0}')

          echo "growth=$GROWTH" >> "$GITHUB_OUTPUT"
          echo "threshold=$THRESHOLD" >> "$GITHUB_OUTPUT"
          echo "days=$DAYS" >> "$GITHUB_OUTPUT"
          echo "Sidecar net growth over last $DAYS days: $GROWTH lines (threshold: $THRESHOLD)"

      - name: Check for override trailer
        id: override
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          # Sur pull_request event, HEAD est un merge commit synthétique sans
          # message utilisateur. Il faut inspecter les vrais commits de la PR
          # via la plage base..head. On scanne TOUS les commits de la PR
          # plutôt que seulement le head — un dev peut placer le trailer sur
          # n'importe quel commit (souvent celui qui décrit le motif d'urgence).
          MSG=$(git log --format=%B "$BASE_SHA..$HEAD_SHA")
          if echo "$MSG" | grep -qE '^Sidecar-Growth-Override:[[:space:]]*\S+'; then
            REASON=$(echo "$MSG" | grep -E '^Sidecar-Growth-Override:' | head -1 | sed 's/^Sidecar-Growth-Override:[[:space:]]*//')
            echo "override=true" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "::warning::Sidecar-Growth-Override invoked: $REASON"
          else
            echo "override=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate decision
        run: |
          set -eu
          GROWTH="${{ steps.growth.outputs.growth }}"
          THRESHOLD="${{ steps.growth.outputs.threshold }}"
          DAYS="${{ steps.growth.outputs.days }}"
          OVERRIDE="${{ steps.override.outputs.override }}"

          if [ "$GROWTH" -le "$THRESHOLD" ]; then
            echo "✓ Sidecar growth ($GROWTH lines / $DAYS d) sous le seuil ($THRESHOLD). OK."
            exit 0
          fi

          if [ "$OVERRIDE" = "true" ]; then
            echo "⚠ Seuil dépassé ($GROWTH > $THRESHOLD) mais override autorisé."
            echo "   Motif : ${{ steps.override.outputs.reason }}"
            echo "   Le refactor reste obligatoire après ce fix d'urgence."
            exit 0
          fi

          # A-01 (audit 2026-06-12) : sidecar.py est en cours de réduction active
          # (handlers -> services/). Un hard-fail sur CHAQUE PR touchant sidecar.py
          # est devenu contre-productif — il passait au rouge les PRs de réduction
          # de dette elles-mêmes (la fenêtre 90 j reste dominée par une croissance
          # historique). On rend donc le gate INFORMATIF (warning, non bloquant)
          # tant que l'extraction A-01 progresse ; à re-durcir (exit 1) une fois le
          # net repassé sous le seuil. Voir docs/AUDIT_FOLLOW_UP.md (A-01).
          echo "::warning::sidecar.py : +$GROWTH lignes nettes sur $DAYS j (seuil $THRESHOLD). Extraction A-01 en cours — gate informatif (non bloquant)."
          exit 0
