name: Release Gate (no secrets)

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gate:
    name: Release gate — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tauri-shell/package-lock.json
            tauri-app/package-lock.json
            tauri-prep/package-lock.json

      - name: Install Python dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Install npm dependencies (shell)
        run: npm --prefix tauri-shell ci --prefer-offline

      - name: Install npm dependencies (app)
        run: npm --prefix tauri-app ci --prefer-offline

      - name: Install npm dependencies (prep)
        run: npm --prefix tauri-prep ci --prefer-offline

      - name: Run release gate
        id: gate
        run: |
          mkdir -p build
          # stdout = JSON only; operator progress logged to build/release_gate.log
          python scripts/release_gate.py > build/release_gate.json
          echo "gate_status=$(python -c "import json; print(json.load(open('build/release_gate.json'))['status'])")" >> "$GITHUB_OUTPUT"

      - name: Print gate summary
        if: always()
        run: |
          python -c "
          import json, sys
          d = json.load(open('build/release_gate.json'))
          print('Gate status:', d['status'])
          print('Steps:', d['summary'])
          for s in d.get('failed_steps', []):
              print(' FAILED:', s)
          "

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ matrix.os }}
          path: |
            build/release_gate.json
            build/release_gate.log
          retention-days: 14
