name: linux-manylinux-sidecar

# NOTE: disabled from automatic tag triggers — manylinux2014 Python (/opt/python/cp311-cp311)
# was built without --enable-shared, which PyInstaller requires. Linux sidecar is handled
# by build-sidecar.yml (ubuntu-latest + actions/setup-python) and tauri-shell-build.yml.
# Re-enable once the Dockerfile is updated to use a Python compiled with --enable-shared.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-manylinux:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sidecar in manylinux container
        run: bash scripts/linux_manylinux_build_sidecar.sh --format onedir --out tauri/src-tauri/binaries

      - name: Enforce sidecar size budget
        run: |
          python scripts/check_sidecar_size_budget.py \
            --manifest tauri/src-tauri/binaries/sidecar-manifest.json \
            --budget-file bench/fixtures/sidecar_size_budget.json

      - name: Verify executable starts (--help)
        run: |
          EXE_PATH="$(python -c 'import json;from pathlib import Path;print(json.loads(Path(\"tauri/src-tauri/binaries/sidecar-manifest.json\").read_text(encoding=\"utf-8\"))[\"executable_path\"])')"
          chmod +x "$EXE_PATH"
          "$EXE_PATH" --help >/dev/null

      - name: Upload manylinux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-manylinux-onedir
          path: |
            tauri/src-tauri/binaries/multicorpus-*
            tauri/src-tauri/binaries/sidecar-manifest.json
