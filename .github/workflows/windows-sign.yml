name: windows-sign

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  sign-sidecar:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install project with packaging extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[packaging]"

      - name: Build sidecar (onefile)
        run: python scripts/build_sidecar.py --preset tauri --format onefile

      - name: Enforce sidecar size budget
        run: python scripts/check_sidecar_size_budget.py --manifest tauri/src-tauri/binaries/sidecar-manifest.json --budget-file bench/fixtures/sidecar_size_budget.json

      - name: Sign sidecar executable (if configured)
        shell: pwsh
        env:
          WIN_SIGN_CERT_PFX_BASE64: ${{ secrets.WIN_SIGN_CERT_PFX_BASE64 }}
          WIN_SIGN_CERT_PASSWORD: ${{ secrets.WIN_SIGN_CERT_PASSWORD }}
        run: |
          $manifest = Get-Content "tauri/src-tauri/binaries/sidecar-manifest.json" | ConvertFrom-Json
          ./scripts/windows_sign_sidecar.ps1 -FilePath $manifest.executable_path -SkipIfMissing

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: windows-sidecar-onefile
          path: |
            tauri/src-tauri/binaries/multicorpus-*
            tauri/src-tauri/binaries/sidecar-manifest.json
