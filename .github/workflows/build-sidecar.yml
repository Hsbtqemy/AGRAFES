name: build-sidecar

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            format: onefile
          - os: ubuntu-latest
            format: onedir
          - os: windows-latest
            format: onedir

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Restore PyInstaller cache
        uses: actions/cache@v4
        with:
          path: build/sidecar_pyinstaller
          key: sidecar-pyinstaller-${{ runner.os }}-${{ matrix.format }}-${{ hashFiles('pyproject.toml', 'scripts/build_sidecar.py', 'scripts/sidecar_entry.py', 'src/multicorpus_engine/**/*.py', 'migrations/*.sql') }}
          restore-keys: |
            sidecar-pyinstaller-${{ runner.os }}-${{ matrix.format }}-
            sidecar-pyinstaller-${{ runner.os }}-

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[packaging]"

      - name: Download spaCy models
        run: |
          python -m spacy download fr_core_news_md
          python -m spacy download en_core_web_md
          python -m spacy download de_core_news_md
          python -m spacy download es_core_news_md
          python -m spacy download it_core_news_md
          python -m spacy download sv_core_news_sm
          python -m spacy download ro_core_news_md
          python -m spacy download el_core_news_sm
          python -m spacy download xx_ent_wiki_sm

      - name: Build sidecar binary
        run: python scripts/build_sidecar.py --preset tauri --format "${{ matrix.format }}" --no-clean

      - name: Enforce sidecar size budget
        shell: bash
        run: |
          python scripts/check_sidecar_size_budget.py \
            --manifest tauri/src-tauri/binaries/sidecar-manifest.json \
            --budget-file bench/fixtures/sidecar_size_budget.json

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.os }}-${{ matrix.format }}
          path: |
            tauri/src-tauri/binaries/multicorpus-*
            tauri/src-tauri/binaries/sidecar-manifest.json
