name: Smoke tests (no secrets)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel in-progress runs for the same ref
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Sidecar smoke (Python integration) ───────────────────────────────────
  sidecar-smoke:
    name: Sidecar smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install multicorpus_engine (dev)
        run: pip install -e ".[dev]"

      - name: Run sidecar smoke test
        run: python scripts/ci_smoke_sidecar.py --timeout 60

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: smoke-logs-${{ matrix.os }}
          path: /tmp/agrafes_smoke_*
          retention-days: 3

  # ── 2. Frontend builds (no Rust / no secrets) ───────────────────────────────
  frontend-builds:
    name: Frontend builds
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            tauri-app/package-lock.json
            tauri-prep/package-lock.json
            tauri-shell/package-lock.json

      - name: Install deps (tauri-app)
        run: npm --prefix tauri-app ci

      - name: Build tauri-app
        run: npm --prefix tauri-app run build

      - name: Install deps (tauri-prep)
        run: npm --prefix tauri-prep ci

      - name: Build tauri-prep
        run: npm --prefix tauri-prep run build

      - name: Install deps (tauri-shell)
        run: npm --prefix tauri-shell ci

      - name: Build tauri-shell
        run: npm --prefix tauri-shell run build

      - name: Run tauri-prep unit tests (vitest)
        run: npm --prefix tauri-prep test

      - name: Run tauri-app unit tests (vitest)
        run: npm --prefix tauri-app test

      - name: Run tauri-shell unit tests (vitest)
        run: npm --prefix tauri-shell test

  # ── 3. Python unit tests (mirrors ci.yml, duplicated here for smoke gate) ───
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install project (dev)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q
