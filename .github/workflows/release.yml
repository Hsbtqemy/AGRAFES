name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-windows:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WIN_SIGN_CERT_PFX_BASE64: ${{ secrets.WIN_SIGN_CERT_PFX_BASE64 }}
      WIN_SIGN_CERT_PASSWORD: ${{ secrets.WIN_SIGN_CERT_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            format: onefile
            artifact_suffix: macos
          - os: windows-latest
            format: onefile
            artifact_suffix: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Restore PyInstaller cache
        uses: actions/cache@v4
        with:
          path: build/sidecar_pyinstaller
          key: sidecar-pyinstaller-${{ runner.os }}-${{ matrix.format }}-${{ hashFiles('pyproject.toml', 'scripts/build_sidecar.py', 'scripts/sidecar_entry.py', 'src/multicorpus_engine/**/*.py', 'migrations/*.sql') }}
          restore-keys: |
            sidecar-pyinstaller-${{ runner.os }}-${{ matrix.format }}-
            sidecar-pyinstaller-${{ runner.os }}-

      - name: Install project with packaging extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[packaging]"

      - name: Build sidecar
        run: python scripts/build_sidecar.py --preset tauri --format "${{ matrix.format }}" --no-clean

      - name: Enforce sidecar size budget
        shell: bash
        run: |
          python scripts/check_sidecar_size_budget.py \
            --manifest tauri/src-tauri/binaries/sidecar-manifest.json \
            --budget-file bench/fixtures/sidecar_size_budget.json

      - name: Import macOS signing certificate (if configured)
        if: ${{ matrix.os == 'macos-latest' && env.MACOS_CERT_P12_BASE64 != '' && env.MACOS_CERT_P12_PASSWORD != '' }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/agrafes-signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          python -c 'import base64,os;from pathlib import Path;Path(os.environ["RUNNER_TEMP"]).joinpath("signing_cert.p12").write_bytes(base64.b64decode(os.environ["MACOS_CERT_P12_BASE64"]))'
          security import "$RUNNER_TEMP/signing_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

      - name: Sign + notarize sidecar on macOS (if configured)
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          BIN_PATH="$(python scripts/read_manifest_field.py tauri/src-tauri/binaries/sidecar-manifest.json executable_path)"
          bash scripts/macos_sign_and_notarize_sidecar.sh --binary "$BIN_PATH" --allow-unsigned

      - name: Sign sidecar on Windows (if configured)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $manifest = Get-Content "tauri/src-tauri/binaries/sidecar-manifest.json" | ConvertFrom-Json
          ./scripts/windows_sign_sidecar.ps1 -FilePath $manifest.executable_path -SkipIfMissing

      - name: Rename manifest with platform suffix
        shell: bash
        run: |
          cp tauri/src-tauri/binaries/sidecar-manifest.json \
             tauri/src-tauri/binaries/sidecar-manifest-${{ matrix.artifact_suffix }}.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.format }}
          path: |
            tauri/src-tauri/binaries/multicorpus-*
            tauri/src-tauri/binaries/sidecar-manifest-${{ matrix.artifact_suffix }}.json

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Restore PyInstaller cache
        uses: actions/cache@v4
        with:
          path: build/sidecar_pyinstaller
          key: sidecar-pyinstaller-linux-onedir-${{ hashFiles('pyproject.toml', 'scripts/build_sidecar.py', 'scripts/sidecar_entry.py', 'src/multicorpus_engine/**/*.py', 'migrations/*.sql') }}
          restore-keys: |
            sidecar-pyinstaller-linux-onedir-

      - name: Install project with packaging extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[packaging]"

      - name: Build sidecar (onedir)
        run: python scripts/build_sidecar.py --preset tauri --format onedir --no-clean

      - name: Enforce sidecar size budget
        run: |
          python scripts/check_sidecar_size_budget.py \
            --manifest tauri/src-tauri/binaries/sidecar-manifest.json \
            --budget-file bench/fixtures/sidecar_size_budget.json

      - name: Verify executable starts
        run: |
          EXE_PATH="$(python scripts/read_manifest_field.py tauri/src-tauri/binaries/sidecar-manifest.json executable_path)"
          chmod +x "$EXE_PATH"
          "$EXE_PATH" --help >/dev/null

      - name: Rename manifest with platform suffix
        run: |
          cp tauri/src-tauri/binaries/sidecar-manifest.json \
             tauri/src-tauri/binaries/sidecar-manifest-linux.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-onedir
          path: |
            tauri/src-tauri/binaries/multicorpus-*
            tauri/src-tauri/binaries/sidecar-manifest-linux.json

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - build-macos-windows
      - build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Zip Linux onedir artifact
        run: |
          LINUX_DIR=$(find release-artifacts -type d -name "multicorpus-*linux*" | head -n1)
          if [ -n "$LINUX_DIR" ]; then
            ARCH=$(basename "$LINUX_DIR")
            zip -r "release-artifacts/release-linux-onedir/${ARCH}.zip" "$LINUX_DIR"
            echo "Zipped $LINUX_DIR → ${ARCH}.zip"
          fi

      - name: Prepare release assets (deduplicate, skip empty files)
        run: |
          mkdir -p release-assets
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          src = Path("release-artifacts")
          dst = Path("release-assets")

          # Collect only non-empty files with allowed extensions or known prefixes
          SKIP_NAMES = {"sidecar-manifest.json"}  # bare name, superseded by OS-suffixed ones

          by_name = {}
          for p in src.rglob("*"):
              if not p.is_file():
                  continue
              if p.stat().st_size == 0:
                  print(f"  skip (empty): {p}")
                  continue
              if p.name in SKIP_NAMES:
                  print(f"  skip (superseded): {p}")
                  continue
              by_name.setdefault(p.name, []).append(p)

          duplicates = {name: paths for name, paths in by_name.items() if len(paths) > 1}
          if duplicates:
              for name, paths in sorted(duplicates.items()):
                  print(f"  duplicate '{name}':")
                  for p in paths:
                      print(f"    {p}")
              raise SystemExit("Duplicate release asset basenames detected (see above).")

          for paths in by_name.values():
              shutil.copy2(paths[0], dst / paths[0].name)

          print("Release assets:")
          for p in sorted(dst.iterdir()):
              print(f"  {p.name}  ({p.stat().st_size:,} bytes)")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: CHANGELOG.md
          fail_on_unmatched_files: false
